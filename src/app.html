<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#6600e7" />
		<meta name="robots" content="index, follow" />
		
		<!-- Open Graph / Social -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Acellus Health - AI-Powered Cancer Care" />
		<meta property="og:description" content="We use AI to extract critical data from medical histories to fuel personalized medicine." />
		<meta property="og:image" content="/og-image.png" />
		
		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Acellus Health - AI-Powered Cancer Care" />
		<meta name="twitter:description" content="We use AI to extract critical data from medical histories to fuel personalized medicine." />
		
		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
